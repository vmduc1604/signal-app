<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Signal Transmission Mode Dashboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#3c83f6",
              "background-light": "#f5f7f8",
              "background-dark": "#0B0F1A",
            },
            fontFamily: {
              display: ["Space Grotesk", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "1rem",
              lg: "2rem",
              xl: "3rem",
              full: "9999px",
            },
            backgroundImage: {
              "star-pattern":
                "radial-gradient(circle, rgba(255,255,255,0.15) 1px, transparent 1px)",
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      .glow-effect {
        box-shadow: 0 0 20px rgba(60, 131, 246, 0.4);
        @apply transition-all duration-300;
      }
      .glow-effect:hover {
        box-shadow: 0 0 30px rgba(60, 131, 246, 0.6);
        @apply scale-105;
      }
      .stars-bg {
        background-size: 50px 50px;
        mask-image: linear-gradient(to bottom, black 0%, transparent 95%);
        -webkit-mask-image: linear-gradient(
          to bottom,
          black 0%,
          transparent 95%
        );
      }
      .secondary-control {
        @apply text-slate-400 hover:text-white hover:bg-white/5 p-3 rounded-full transition-all duration-200;
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col overflow-x-hidden transition-colors duration-300"
  >
    <header
      class="w-full border-b border-slate-200 dark:border-white/10 px-6 py-4 relative z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md"
    >
      <div class="max-w-[1200px] mx-auto flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="size-6 text-primary">
            <span class="material-symbols-outlined text-[24px]"
              >satellite_alt</span
            >
          </div>
          <h2
            class="text-slate-900 dark:text-white text-lg font-bold tracking-tight"
          >
            Signal
          </h2>
        </div>
        <nav class="hidden md:flex items-center gap-8">
          <a
            class="text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-sm font-medium transition-colors"
            href="#"
            >Dashboard</a
          >
          <a
            class="text-slate-900 dark:text-white font-medium text-sm border-b-2 border-primary pb-0.5"
            href="#"
            >Transmissions</a
          >
          <a
            class="text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-sm font-medium transition-colors"
            href="#"
            >Archives</a
          >
          <a
            class="text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-sm font-medium transition-colors"
            href="#"
            >Settings</a
          >
        </nav>
        <div class="flex items-center gap-4">
          <button
            class="text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors"
          >
            <span class="material-symbols-outlined">notifications</span>
          </button>
          <div
            class="size-9 rounded-full bg-cover bg-center ring-2 ring-slate-200 dark:ring-white/10"
            style="
              background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuAVa6Sjw1S4LfoFEFCbA1kfXwiDSqMrwqamJ24YIg-uJTRD6a63ATwYkBYMFM1xJP5Bs-xmjjDM-Z52f2tC07zjO6QWVpmyxLE1J5rp35jcJSMB8b64gwNXH9E0-Nyh5igCYFHDfRB17v9t6gj-80SRJrVpRxa_XbHASF3rFgrHKI7qorqXpyKdKAIgLtEFTbcCO4rn2JQPUf2kl68vshNmHB57MRPlU8uFsGQ4SFly5MZKIe-HVTvjwdL-fCuQfHcNm94Ktv9vBOY&quot;);
            "
          ></div>
        </div>
      </div>
    </header>
    <main
      class="flex-1 relative flex flex-col items-center justify-center p-6 w-full"
    >
      <div
        class="absolute inset-0 bg-star-pattern stars-bg opacity-30 pointer-events-none z-0"
      ></div>
      <div
        class="layout-content-container flex flex-col items-center max-w-[960px] w-full relative z-10 gap-10 py-6"
      >
        <div class="text-center space-y-3 animate-fade-in-down">
          <h1
            class="text-slate-900 dark:text-white text-2xl md:text-[32px] font-medium leading-relaxed tracking-tight max-w-2xl mx-auto"
          >
            "The stars do not rush, yet they arrive."
          </h1>
          <p
            class="text-slate-500 dark:text-slate-400 text-sm font-normal tracking-wide"
          >
            — Unknown
          </p>
        </div>
        <div
          class="relative w-full max-w-md aspect-square flex items-center justify-center"
        >
          <div
            class="absolute inset-0 rounded-full bg-primary/5 blur-[80px] scale-90"
          ></div>
          <div
            class="w-64 h-64 md:w-80 md:h-80 rounded-full overflow-hidden shadow-2xl shadow-primary/10 transition-transform duration-[2000ms]"
          >
            <img
              alt="High detail 3D full moon with craters"
              class="w-full h-full object-cover filter brightness-110 contrast-125 saturate-0"
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuBonHJKbIdirdJObI_pjFzOnInYv2Hnc31m7X85RpFISPfoa5DQB7sT-MNcs42JCGk3cFGCaZEUgcHRN_fn-CBR1I-f5P1req9uzal7LpeWw56ABgd0KWDH22Byvm0ShEKHC0hGZA9qPtGmlCZHcQK1F22nvuqNPB7GaN-HDxwELiNnZMnaJi30Q1IK69gowHnDo2Or959lVy4QACAe4k0INVBAe8x2ZS7krziTPlzB8sCVL1oNG870M8_-fmyyXGMVS9kK37j3-Hw"
            />
          </div>
          <div
            class="absolute w-[120%] h-[120%] border border-slate-200/20 dark:border-white/5 rounded-full animate-spin"
            style="animation-duration: 60s"
          >
            <div
              class="absolute top-1/2 -right-1 w-2 h-2 bg-primary rounded-full shadow-[0_0_10px_rgba(60,131,246,0.8)]"
            ></div>
          </div>
        </div>
        <div class="flex flex-col items-center gap-8 w-full">
          <div class="flex flex-col items-center gap-2">
            <div
              class="text-slate-900 dark:text-white text-[64px] md:text-[80px] font-bold leading-none tracking-tighter tabular-nums drop-shadow-xl"
            >
              25:00
            </div>
            <div
              class="flex items-center gap-2 text-primary/80 dark:text-primary/80 text-sm font-medium uppercase tracking-widest"
            >
              <span class="material-symbols-outlined text-sm">timer</span>
              Focus Session
            </div>
          </div>
          <div class="flex items-center gap-6 pt-2">
            <button class="secondary-control" title="Reset Session">
              <span class="material-symbols-outlined text-[28px]">refresh</span>
            </button>
            <button
              class="group relative inline-flex items-center justify-center size-20 md:size-24 bg-primary text-white rounded-full glow-effect overflow-hidden"
            >
              <span class="relative z-10 flex items-center">
                <span
                  class="material-symbols-outlined text-[40px] md:text-[48px] fill-1"
                  >play_arrow</span
                >
              </span>
              <div
                class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700 ease-in-out"
              ></div>
            </button>
            <button class="secondary-control" title="Timer Settings">
              <span class="material-symbols-outlined text-[28px]"
                >settings</span
              >
            </button>
          </div>
        </div>
        <div
          class="grid grid-cols-3 gap-8 md:gap-16 mt-4 pt-8 border-t border-slate-200/50 dark:border-white/5 w-full max-w-lg"
        >
          <div class="flex flex-col items-center gap-1">
            <span
              class="text-slate-400 dark:text-slate-500 text-xs uppercase tracking-wider"
              >Completed</span
            >
            <span class="text-slate-900 dark:text-white text-xl font-bold"
              >12</span
            >
          </div>
          <div class="flex flex-col items-center gap-1">
            <span
              class="text-slate-400 dark:text-slate-500 text-xs uppercase tracking-wider"
              >Streak</span
            >
            <span class="text-slate-900 dark:text-white text-xl font-bold"
              >5 Days</span
            >
          </div>
          <div class="flex flex-col items-center gap-1">
            <span
              class="text-slate-400 dark:text-slate-500 text-xs uppercase tracking-wider"
              >Total Hours</span
            >
            <span class="text-slate-900 dark:text-white text-xl font-bold"
              >34.5</span
            >
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
